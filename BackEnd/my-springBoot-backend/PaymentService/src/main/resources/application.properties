spring.config.import=configserver:http://localhost:8888
spring.application.name=PAYMENT-SERVICE
spring.profiles.active=dev
eureka.instance.appname=PAYMENT-SERVICE
eureka.instance.instance-id=PAYMENT-SERVICE:${random.value}
spring.cloud.config.fail-fast=true
server.port=8085

stripe.enabled=true
# Local/dev dummy keys so the service can start.
# Replace with real Stripe keys in production.
stripe.webhook.secret=dummy-webhook
stripe.api.key=dummy-api-key

app.base.url=http://localhost:5173
stripe.success-url=http://localhost:5173/customer-dashboard
stripe.cancel-url=http://localhost:5173/all-car
