spring.config.import=configserver:http://localhost:8888
spring.application.name=NOTIFICATION-SERVICE
spring.profiles.active=dev
eureka.instance.appname=NOTIFICATION-SERVICE
eureka.instance.instance-id=NOTIFICATION-SERVICE:${random.value}
spring.cloud.config.fail-fast=true
server.port=8089

# Local/dev dummy Twilio settings so the service can start.
# Replace with real credentials if you actually want WhatsApp/SMS.
twilio.account.sid=dummy-sid
twilio.auth.token=dummy-token
twilio.whatsapp.from=whatsapp:+1234567890
